#### 监听端口 ####
# 第一组 DNS 服务器 绑定 direct 组 停用双栈 IP 优选 禁用HTTPS记录查询 跳过 nameserver 规则（使用 IP DoT）
bind [::]:531 -group direct -no-dualstack-selection -force-https-soa -no-rule-nameserver

# 第二组 DNS 服务器 绑定 overseas 组 停用双栈 IP 优选 禁用IPV6查询 禁用HTTPS记录查询 跳过 nameserver 规则（使用 IP DoT）
bind [::]:532 -group overseas -no-dualstack-selection -force-aaaa-soa -force-https-soa  -no-rule-nameserver

#### 日志 ####
# 日志大小
log-size 16M
# 日志文件路径
log-file /etc/smartdns/smartdns.log
# 日志归档个数
log-num 1
# 日志级别
log-level off
#审计大小
audit-size 64K
# 审计归档个数
audit-num 1

#### 缓存 ####
# 域名结果缓存个数，1 条缓存占内存 512 字节。0 关闭缓存，不配置为系统自动设置（系统内存 128 M，自动缓存 32768 条占内存 16 M；系统内存 256 M，自动缓存 65536 条占内存 32 M；系统内存 512 M，自动缓存 131072 条占内存 64 M；系统内存大于 512 M，自动缓存 262144 条占内存 128 M）。
cache-size 32768
# 域名预加载
prefetch-domain yes
# 是否持久化缓存 退出时保存cache到磁盘，启动时加载。
cache-persist yes
# 缓存持久化文件路径
cache-file /etc/smartdns/smartdns.cache
# 缓存持久化时间，秒。30分钟刷新一次smartdns.cache
cache-checkpoint-time 1800

### 过期缓存 ###
# 过期缓存服务功能。开启此功能后，如果有请求时尝试回应 TTL 为 serve-expired-reply-ttl 的过期记录，并发查询记录，以避免查询等待
serve-expired no
# 回应的过期缓存 TTL，此时间表示当缓存中域名 TTL 超时时，返回给客户端的 TTL 时间，让客户端在下列TTL时间后再次查询，秒
serve-expired-reply-ttl 2
# 过期缓存服务最长超时时间，此时间表示过期缓存多长时间未访问，则从缓存中释放。秒，0 表示停用，大于 0 表示指定的超时的秒数。1天
serve-expired-ttl 86400
# 过期缓存预查询时间，此时间表示过期缓存在多长时间未访问，主动进行预先获取，以避免 IP 无效；开启过期缓存后，prefetch-domain 的功能将和未开启不同。秒，到达对应超时时间后预查询。30分钟
serve-expired-prefetch-time 1800

#### IPV6 #####
# 双栈IP优选
dualstack-ip-selection no

# 测速模式
speed-check-mode tcp:443,tcp:80,ping
# 首次查询响应模式。模式：
#[first-ping]: 最快ping响应地址模式，DNS上游最快查询时延+ping时延最短，查询等待与链接体验最佳;
#[fastest-ip]: 最快IP地址模式，查询到的所有IP地址中ping最短的IP。需等待IP测速;
#[fastest-response]: 最快响应的DNS结果，DNS查询等待时间最短，返回的IP地址可能不是最快。
response-mode first-ping

#### TTL ####
# 域名结果 TTL
# rr-ttl 600
# 允许的最小 TTL 值
# rr-ttl-min 60
# 允许的最大 TTL 值
# rr-ttl-max 600
# 允许返回给客户端的最大 TTL 值
# rr-ttl-reply-max 60


#### 其它 ####
# 最大并发请求数量
#max-query-limit 1000
# 强制指定 qtype 返回 SOA。禁用 SOA 65 即禁用HTTPS记录查询
force-qtype-SOA 65
# TCP 链接空闲超时时间
tcp-idle-time 120
# 允许返回给客户的最大IP数量
max-reply-ip-num 1
# 支持读取dnsmasq dhcp文件解析本地主机名功能
# dnsmasq-lease-file /tmp/dnsmasq.leases
# 是否启用mDNS查询使用mDNS协议解析本地网络主机名
# mdns-lookup yes


