#### web 服务 ####
# 启用WebUI插件
plugin smartdns_ui.so
# 查询日志最大存储时间，单位为秒，最小值为3600秒
smartdns-ui.max-query-log-age 3600
# 监听服务的IP和端口号
smartdns-ui.ip http://0.0.0.0:6080
