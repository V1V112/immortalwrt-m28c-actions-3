# ======================================================================
# sing-box / mihomo nftables 透明代理规则（纯 nft 版）
# ======================================================================
# 编码说明：本文件已从 GBK/GB18030 转换为 UTF-8，无 BOM。
# 使用场景：不依赖 eBPF raw/notrack 链，全部由 nftables 完成分流。
#
# 处理逻辑：
#   - 局域网客户端 UDP：prerouting -> mangle-prerouting -> TProxy
#   - 局域网客户端 TCP：prerouting -> nat-prerouting -> redirect
#   - 路由器本机 UDP：output -> mangle-output -> 只打 mark，不 tproxy
#   - 路由器本机 TCP：output -> nat-output -> redirect
#
# 标记约定：
#   meta mark / ct mark = 1  -> sing-box
#   meta mark / ct mark = 2  -> mihomo
#   meta mark = 8888        -> 代理进程自身流量，避免回环
#
# 端口约定：以下端口保持原文件不变：
#   sing-box UDP TProxy :7895，sing-box TCP redirect :7899
#   mihomo   UDP TProxy :7893，mihomo   TCP redirect :7892
# 如果你实际 sing-box 的 tproxy 入站是 7894、redirect 入站是 7893，
# 需要同步修改 singbox-tproxy / nat-prerouting / nat-output 中的对应端口。
# ======================================================================

table inet sing-box {
  # ====================================================================
  # 1. IP 地址集合定义
  # ====================================================================

  # --------------------------------------------------------------------
  # 1.1 Sing-box：局域网客户端目标地址集合
  # --------------------------------------------------------------------
  # local_ipv4 用于 prerouting：局域网客户端访问这些 IPv4 目标时，
  # UDP 进入 sing-box TProxy，TCP 进入 sing-box redirect。
  set local_ipv4 {
    type ipv4_addr
    flags interval
    elements = {
      30.0.0.0/8
    }
  }

  # local_ipv6 用于 prerouting：作用同 local_ipv4，但匹配 IPv6 目标。
  set local_ipv6 {
    type ipv6_addr
    flags interval
    elements = {
      fc00::/18
    }
  }

  # --------------------------------------------------------------------
  # 1.2 Sing-box：路由器本机 output 目标地址集合
  # --------------------------------------------------------------------
  # router_ipv4 用于路由器自己发出的 IPv4 流量，例如路由器自身 DNS 请求。
  set router_ipv4 {
    type ipv4_addr
    flags interval
    elements = {
      28.0.0.0/8
    }
  }

  # router_ipv6 用于路由器自己发出的 IPv6 流量。
  set router_ipv6 {
    type ipv6_addr
    flags interval
    elements = {
      fc00::/18
    }
  }

  # --------------------------------------------------------------------
  # 1.3 Mihomo fake-ip / 专用目标地址集合
  # --------------------------------------------------------------------
  set mihomo_ipv4 {
    type ipv4_addr
    flags interval
    elements = {
      30.0.0.0/8
    }
  }

  set mihomo_ipv6 {
    type ipv6_addr
    flags interval
    elements = {
      fc00::/18
    }
  }

  # ====================================================================
  # 2. 自定义处理链：只定义动作，不主动挂载 hook
  # ====================================================================

  # sing-box UDP TProxy 动作链：
  #   - meta mark set 1：给当前包打 sing-box 标记；
  #   - ct mark set 1：把标记写入连接跟踪，后续包可走快速路径；
  #   - tproxy to :7894：透明代理到 sing-box UDP/TProxy 入站。
  chain singbox-tproxy {
    meta l4proto udp meta mark set 1 ct mark set 1 tproxy to :7894 accept
  }

  # sing-box output 打标链：用于路由器本机 UDP 流量，只打标，不执行 tproxy。
  chain singbox-mark {
    meta mark set 1 ct mark set 1
  }

  # mihomo UDP TProxy 动作链。
  chain mihomo-tproxy {
    meta l4proto udp meta mark set 2 ct mark set 2 tproxy to :7894 accept
  }

  # mihomo output 打标链。
  chain mihomo-mark {
    meta mark set 2 ct mark set 2
  }

  # 注意：纯 nft 版不包含 raw-prerouting / raw-output / notrack 链，
  # 也不包含 eBPF 专用 filter-input / filter-forward 放行链。

  # ====================================================================
  # 3. 系统 Hook 链
  # ====================================================================

  # --------------------------------------------------------------------
  # 3.1 MANGLE PREROUTING：处理局域网客户端 UDP 透明代理
  # --------------------------------------------------------------------
  chain mangle-prerouting {
    type filter hook prerouting priority mangle; policy accept;

    # 只处理 UDP。非 UDP 直接返回，交给后面的 TCP NAT 链或系统默认规则。
    meta l4proto != udp return

    # 目标地址是路由器本机地址时不劫持，防止访问 LuCI、SSH、DNS 等本机服务被误代理。
    fib daddr type local return

    # 快速路径：连接跟踪里已经有标记时，直接恢复 meta mark 并进入对应 TProxy 动作链。
    ct mark 1 meta mark set 1 goto singbox-tproxy
    ct mark 2 meta mark set 2 goto mihomo-tproxy

    # 慢速路径：首包按目标 IP 集合判断交给谁处理。
    ip daddr @local_ipv4 goto singbox-tproxy
    ip6 daddr @local_ipv6 goto singbox-tproxy
    ip daddr @mihomo_ipv4 goto mihomo-tproxy
    ip6 daddr @mihomo_ipv6 goto mihomo-tproxy
  }

  # --------------------------------------------------------------------
  # 3.2 MANGLE OUTPUT：处理路由器本机 UDP 流量
  # --------------------------------------------------------------------
  chain mangle-output {
    type route hook output priority mangle; policy accept;

    # 代理进程自身流量应提前打上 8888，命中后直接返回，防止代理访问上游时再次进入代理。
    meta mark 8888 return

    # 只处理 UDP。
    meta l4proto != udp return

    # 目标是本机地址时不代理。
    fib daddr type local return

    # 快速路径：根据 ct mark 恢复 meta mark。
    ct mark 1 meta mark set 1 goto singbox-mark
    ct mark 2 meta mark set 2 goto mihomo-mark

    # 慢速路径：路由器自身访问这些目标时写入对应 mark。
    ip daddr @router_ipv4 goto singbox-mark
    ip6 daddr @router_ipv6 goto singbox-mark
    ip daddr @mihomo_ipv4 goto mihomo-mark
    ip6 daddr @mihomo_ipv6 goto mihomo-mark
  }

  # --------------------------------------------------------------------
  # 3.3 NAT PREROUTING：处理局域网客户端 TCP redirect
  # --------------------------------------------------------------------
  chain nat-prerouting {
    type nat hook prerouting priority dstnat; policy accept;

    # 只处理 TCP。UDP 不走 redirect，UDP 由 mangle-prerouting 的 TProxy 处理。
    meta l4proto != tcp return

    # sing-box TCP redirect 到 :7893。
    # 如果你的 sing-box redirect 入站端口是 7893，请把这里改成 :7893。
    ip daddr @local_ipv4 meta l4proto tcp redirect to :7893
    ip6 daddr @local_ipv6 meta l4proto tcp redirect to :7893

    # mihomo TCP redirect 到 :7893。
    ip daddr @mihomo_ipv4 meta l4proto tcp redirect to :7893
    ip6 daddr @mihomo_ipv6 meta l4proto tcp redirect to :7893
  }

  # --------------------------------------------------------------------
  # 3.4 NAT OUTPUT：处理路由器本机 TCP redirect
  # --------------------------------------------------------------------
  chain nat-output {
    type nat hook output priority filter; policy accept;

    # 代理进程自身流量直接跳过，避免回环。
    meta mark 8888 return

    # 只处理 TCP。
    meta l4proto != tcp return

    # sing-box TCP redirect 到 :7893。
    ip daddr @router_ipv4 meta l4proto tcp redirect to :7893
    ip6 daddr @router_ipv6 meta l4proto tcp redirect to :7893

    # mihomo TCP redirect 到 :7893。
    ip daddr @mihomo_ipv4 meta l4proto tcp redirect to :7893
    ip6 daddr @mihomo_ipv6 meta l4proto tcp redirect to :7893
  }
}
